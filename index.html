<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesa com Pessoal - Acordo Judicial de Brumadinho</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* ==================== VARIÁVEIS DE CORES ==================== */

            --primary-dark: #1a3a5c;
            --primary-darker: #0f2a44;
            --accent-red: #b93c42;
            --accent-bright: #db233f;
            --background-light: #f5f7fa;

        /* ==================== ESTILOS GERAIS ==================== */
        body {

        }

        /* ==================== DATA ATUALIZAÇÃO ==================== */

        /* ==================== FILTROS ==================== */

        }

        /* ==================== CARDS DE MÉTRICAS ==================== */
        .metric-card {

            border-radius: 10px;

            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);

            border-top: 4px solid var(--primary-dark);
            transition: all 0.3s ease;

        }
        
        .metric-card:hover {

        .metric-value {

        /* ==================== CONTAINER DE GRÁFICOS ==================== */

        .table tbody td {

        /* ==================== BOTÕES ==================== */

        .btn-secondary-custom {

            font-weight: 600;

        }

            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;

        .btn-export:hover {

        .btn-action {

            background-color: var(--primary-dark);

        /* ==================== BOTÃO COMPARTILHAR ==================== */
        .share-dropdown {
            position: relative;

        .share-options {
            display: none;
            position: absolute;

        }
        
        .share-options.show { display: block; }
        
        .share-options a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;

        }
        .share-options a:hover { background-color: var(--background-light); color: var(--accent-red); }
        .share-options a i { font-size: 18px; width: 20px; text-align: center; }

        /* ==================== NAVEGAÇÃO ==================== */

            background: white;
            border-radius: 10px;

            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);

            white-space: nowrap;

        .nav-tabs .nav-link:hover { background-color: rgba(41, 67, 90, 0.05) !important; color: var(--accent-red) !important; }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%) !important;

        }

        /* ==================== MODAL ==================== */
        .modal-creative .modal-header {

        .info-card {
            background: white;
            border-radius: 10px;
            padding: 20px;

            border-left: 4px solid var(--accent-red);
            margin-bottom: 15px;

        .info-card.primary { border-left-color: var(--primary-dark); }
        .info-label { font-size: 11px; text-transform: uppercase; color: #6c757d; font-weight: 600; margin-bottom: 5px; }
        .info-value { font-size: 14px; font-weight: 600; color: var(--primary-dark); word-break: break-word; }
        .info-value.highlight { font-size: 18px; color: var(--accent-red); }

        /* ==================== PAGINAÇÃO ==================== */
        .pagination-container {
            display: flex;

            align-items: center;
            padding: 15px 20px;

        }
        
        .pagination-info {
            font-size: 13px;
            color: #6c757d;
        }
        
        .pagination .page-link {
            color: var(--primary-dark);

        }
        .pagination .page-link:hover {
            color: var(--accent-red);
            background-color: #f8f9fa;
            border-color: #dee2e6;
        }
        .pagination .page-item.active .page-link {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);

        }
        
        .items-per-page {
            width: 70px;
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            background-color: white;
            color: var(--primary-dark);

        }
        
        .search-box {
            border: 2px solid var(--primary-dark) !important;
            border-radius: 6px !important;
            padding: 8px 12px !important;
            font-size: 13px !important;
            width: 250px !important;
            background-color: white;
            color: var(--primary-dark);
        }
        .search-box:focus {
            border-color: var(--accent-red) !important;
            box-shadow: 0 0 0 2px rgba(185, 60, 66, 0.15);

        }

        /* ==================== METADADOS ==================== */
        .metadata-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--info-blue);
        }
        .metadata-item { font-size: 13px; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .metadata-item strong { color: var(--primary-dark); width: 180px; display: inline-block; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="container dashboard-spacing">
            <!-- ==================== MENU DE NAVEGAÇÃO ==================== -->
            <div class="nav-tabs-container">
                <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">

    <!-- ==================== MODAL DE DETALHES ==================== -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content modal-creative">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="material-icons me-2">account_balance</i> Detalhes do Servidor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>

                </div>
            </div>
        </div>
    </div>

    <!-- ==================== LOADING OVERLAY ==================== -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center;">
        <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================
        // CONFIGURAÇÕES E VARIÁVEIS GLOBAIS
        // ============================================
        const GITHUB_CSV_URL = 'https://raw.githubusercontent.com/transparencia-mg/despesa_pessoal_acordo_brumadinho/refs/heads/main/dataset/data/despesa-pessoal-acordo-judicial-brumadinho.csv';
        let dadosCompletos = [];
        let dadosFiltrados = [];
        let metricaGeral = {};

        // Variáveis de paginação para Consulta Individual
        let paginaAtualCI = 1;
        let itensPorPaginaCI = 50;
        let totalPaginasCI = 1;
        let todosServidores = [];
        let servidoresFiltrados = [];

        const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
        const chartPalette = ['#1a3a5c','#2c5f8a','#3a7cb8','#5a9fd4','#7ab8e0','#9dd1ec','#bde4f5','#d4a017','#c0392b','#27ae60'];

        // ============================================
        // FUNÇÕES DE INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            carregarDados();
            setupAtualizacaoData();
            removeAllScrollIssues();
            console.log('Dashboard de Despesa com Pessoal carregado com sucesso!');
        });

        // ==================== FUNÇÕES DE SCROLL E IFRAME ====================
        function removeAllScrollIssues() {
            console.log('Removendo problemas de scroll duplo...');
            const elements = [
                document.body,
                document.documentElement,
                document.querySelector('.main-container'),
                document.querySelector('.container.dashboard-spacing'),
                document.querySelector('.tab-content'),
                ...document.querySelectorAll('.tab-pane'),
                ...document.querySelectorAll('.table-container'),
                ...document.querySelectorAll('.row'),
                ...document.querySelectorAll('.col'),
                ...document.querySelectorAll('.container'),
                ...document.querySelectorAll('.container-fluid')
            ];
            
            elements.forEach(el => {
                if (el && el.style) {
                    el.style.overflowY = 'visible';
                    el.style.overflowX = 'visible';
                    el.style.overflow = 'visible';
                }
            });
            
            document.body.classList.remove('overflow-auto');
            document.documentElement.classList.remove('overflow-auto');
            document.documentElement.style.height = 'auto';
            document.body.style.height = 'auto';
        }

        function iframeUpdateHeight() {
            console.log('Atualizando altura do iframe...');
            document.body.style.display = 'none';
            document.body.offsetHeight;
            document.body.style.display = '';
            
            const html = document.documentElement;
            const body = document.body;
            const scrollHeight = Math.max(
                body.scrollHeight,
                html.scrollHeight,
                body.offsetHeight,
                html.offsetHeight
            );
            
            const finalHeight = scrollHeight + 10;
            console.log('Altura calculada:', finalHeight);
            
            try {
                window.parent.postMessage({ iframeHeight: finalHeight }, '*');
            } catch (error) {
                // Ignora erro se não estiver em iframe
            }
            
            return finalHeight;
        }

        function setupAtualizacaoData() {
            const now = new Date();
            const dataFormatada = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');
            const elementoData = document.getElementById('data-atualizacao-header');
            if (elementoData) {
                elementoData.textContent = dataFormatada;
            }
            console.log('Data de atualização definida:', dataFormatada);
        }

        function setupEventListeners() {
            // Dropdown de compartilhamento - fechar ao clicar fora
            window.addEventListener('click', (e) => {
                if (!e.target.closest('.share-dropdown')) {
                    document.querySelectorAll('.share-options').forEach(opt => opt.classList.remove('show'));
                }
            });
        }

        function mostrarLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = show ? 'flex' : 'none';
            }
        }

        function showError(message) {
            const container = document.querySelector('.main-container');
            if (!container) return;
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'alert alert-danger alert-dismissible fade show';
            errorDiv.innerHTML = `
                <i class="material-icons me-2" style="vertical-align: middle;">warning</i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.prepend(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 5000);
        }

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function formatarMoeda(valor) {
            return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        }
        
        function formatarMesAno(anoMes) {
            if (!anoMes || anoMes.length < 6) return anoMes;
            return `${meses[parseInt(anoMes.substring(4,6))-1] || anoMes.substring(4,6)}/${anoMes.substring(0,4)}`;
        }
        
        function formatarMASP(masp) {
            return masp ? masp.replace(/,0$/, '') : '';
        }
        
        function determinarSituacao(dataTermino) {
            if (!dataTermino || dataTermino.trim() === '' || dataTermino === '0000-00-00 00:00:00') return 'Em andamento';
            try {
                const partes = dataTermino.split(' ')[0].split('-');
                if (partes.length < 3) return 'Em andamento';
                const data = new Date(partes[0], partes[1]-1, partes[2]);
                return data > new Date() ? 'Em andamento' : 'Encerrado';
            } catch { return 'Em andamento'; }
        }

        function parseCSV(texto) {
            const linhas = texto.trim().split('\n');
            const cabecalhos = linhas[0].split(';').map(h => h.trim());
            const dados = [];
            for (let i = 1; i < linhas.length; i++) {
                if (!linhas[i].trim()) continue;
                const valores = linhas[i].split(';');
                const linha = {};
                cabecalhos.forEach((cab, idx) => {
                    let valor = valores[idx]?.trim() || '';
                    if (cab === 'valor') valor = parseFloat(valor.replace(',', '.')) || 0;
                    linha[cab] = valor;
                });
                dados.push(linha);
            }
            return dados;
        }

        function calcularMetricas(dados) {
            const totalGasto = dados.reduce((acc, i) => acc + (i.valor || 0), 0);
            const servidores = new Set(dados.map(i => i.masp)).size;
            const orgaos = new Set(dados.map(i => i.orgao_sigla)).size;
            const anosMeses = dados.map(i => i.ano_mes).sort();
            return {
                totalGasto, totalServidores: servidores, totalOrgaos: orgaos, totalRegistros: dados.length,
                periodoInicio: anosMeses[0] || '', periodoFim: anosMeses[anosMeses.length-1] || ''
            };
        }

        function obterOpcoesFiltro() {
            const anos = [...new Set(dadosCompletos.map(i => i.ano_mes?.substring(0,4)))].filter(Boolean).sort().reverse();
            const meses = [...new Set(dadosCompletos.map(i => i.ano_mes?.substring(4,6)))].filter(Boolean).sort();
            const orgaos = [...new Set(dadosCompletos.map(i => i.orgao_sigla))].filter(Boolean).sort();
            const cargos = [...new Set(dadosCompletos.map(i => i.cargo_descricao))].filter(Boolean).sort();
            return { anos, meses, orgaos, cargos };
        }

        function agruparPorOrgao(dados) {
            const mapa = new Map();
            for (const i of dados) {
                if (!mapa.has(i.orgao_sigla)) {
                    mapa.set(i.orgao_sigla, { sigla: i.orgao_sigla, orgao: i.orgao, total: 0, servidores: new Set() });
                }
                const o = mapa.get(i.orgao_sigla);
                o.total += i.valor || 0;
                o.servidores.add(i.masp);
            }
            return Array.from(mapa.values()).map(o => ({ ...o, servidores: o.servidores.size })).sort((a,b) => b.total - a.total);
        }

        function agruparPorMes(dados) {
            const mapa = new Map();
            for (const i of dados) {
                if (!mapa.has(i.ano_mes)) mapa.set(i.ano_mes, { anoMes: i.ano_mes, label: formatarMesAno(i.ano_mes), total: 0 });
                mapa.get(i.ano_mes).total += i.valor || 0;
            }
            return Array.from(mapa.values()).sort((a,b) => a.anoMes.localeCompare(b.anoMes));
        }

        function obterServidoresUnicos() {
            const mapa = new Map();
            for (const i of dadosCompletos) {
                if (!mapa.has(i.masp)) {
                    mapa.set(i.masp, { ...i, historico: [i] });
                } else {
                    mapa.get(i.masp).historico.push(i);
                    if (i.ano_mes > mapa.get(i.masp).ano_mes) {
                        mapa.get(i.masp).ano_mes = i.ano_mes;
                        mapa.get(i.masp).valor = i.valor;
                    }
                }
            }
            return Array.from(mapa.values()).map(s => {
                const ultimo = s.historico.sort((a,b) => b.ano_mes.localeCompare(a.ano_mes))[0];
                return {
                    masp: s.masp, nome: s.nome, orgao_sigla: s.orgao_sigla, orgao: s.orgao,
                    cargo_descricao: s.cargo_descricao, ultimoAnoMes: ultimo.ano_mes, ultimoValor: ultimo.valor,
                    data_termino_contrato: s.data_termino_contrato, historico: s.historico
                };
            });
        }

        // CARREGAMENTO DE DADOS
        // ============================================
        async function carregarDados() {
            mostrarLoading(true);
            try {
                const resposta = await fetch(GITHUB_CSV_URL);
                const texto = await resposta.text();
                dadosCompletos = parseCSV(texto);
                dadosFiltrados = [...dadosCompletos];
                metricaGeral = calcularMetricas(dadosCompletos);
                todosServidores = obterServidoresUnicos();
                servidoresFiltrados = [...todosServidores];
                
                renderizarVisaoGeral();
                renderizarConsulta();
                renderizarDownloads();
                
                // Atualizar altura do iframe após renderizar
                setTimeout(iframeUpdateHeight, 500);
            } catch (erro) {
                console.error('Erro:', erro);
                showError('Erro ao carregar dados. Tente novamente mais tarde.');
            } finally { mostrarLoading(false); }
        }

        function renderizarPaginacaoCI() {
            const container = document.getElementById('paginacaoContainerCI');
            if (!container) return;
            
            if (servidoresFiltrados.length === 0) {
                container.innerHTML = '<div class="pagination-info">Nenhum registro encontrado</div>';
                return;
            }
            
            const inicio = (paginaAtualCI - 1) * itensPorPaginaCI + 1;
            const fim = Math.min(paginaAtualCI * itensPorPaginaCI, servidoresFiltrados.length);
            
            let html = `
                <div class="pagination-info">
                    Mostrando ${inicio}-${fim} de ${servidoresFiltrados.length.toLocaleString('pt-BR')} registros
                </div>
                <nav>
                    <ul class="pagination mb-0">
            `;
            
            // Botão anterior
            html += `<li class="page-item ${paginaAtualCI === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="mudarPaginaCI(${paginaAtualCI - 1}); return false;">&laquo;</a>
            </li>`;
            
            // Páginas
            let inicioPaginas = Math.max(1, paginaAtualCI - 2);
            let fimPaginas = Math.min(totalPaginasCI, inicioPaginas + 4);
            if (fimPaginas - inicioPaginas < 4) {
                inicioPaginas = Math.max(1, fimPaginas - 4);
            }
            
            for (let i = inicioPaginas; i <= fimPaginas; i++) {
                html += `<li class="page-item ${i === paginaAtualCI ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="mudarPaginaCI(${i}); return false;">${i}</a>
                </li>`;
            }
            
            // Botão próximo
            html += `<li class="page-item ${paginaAtualCI === totalPaginasCI ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="mudarPaginaCI(${paginaAtualCI + 1}); return false;">&raquo;</a>
            </li>`;
            
            html += '</ul></nav>';
            container.innerHTML = html;
        }

        window.mudarPaginaCI = function(pagina) {
            if (pagina < 1 || pagina > totalPaginasCI) return;
            paginaAtualCI = pagina;
            atualizarTabelaConsulta();
        };

        window.verDetalhes = function(masp) {
            const historico = dadosCompletos.filter(i => i.masp === masp).sort((a,b) => b.ano_mes.localeCompare(a.ano_mes));
            if (!historico.length) return;
            const s = historico[0];
            const totalPago = historico.reduce((acc,i)=>acc+(i.valor||0),0);
            const situacao = determinarSituacao(s.data_termino_contrato);
            
            document.getElementById('modalContent').innerHTML = `
                <div class="row">
                    <div class="col-md-6"><div class="info-card primary"><div class="info-label">Servidor</div><div class="info-value highlight">${s.nome}</div><div class="info-label mt-3">MASP</div><div class="info-value">${formatarMASP(s.masp)}</div></div></div>
                    <div class="col-md-6"><div class="info-card"><div class="info-label">Órgão</div><div class="info-value">${s.orgao_sigla} - ${s.orgao}</div><div class="info-label mt-3">Cargo</div><div class="info-value">${s.cargo_descricao || '-'}</div></div></div>
                </div>
                <div class="row">
                    <div class="col-md-4"><div class="info-card"><div class="info-label">Total Pago</div><div class="info-value highlight">${formatarMoeda(totalPago)}</div></div></div>
                    <div class="col-md-4"><div class="info-card"><div class="info-label">Contrato</div><div class="info-value">${s.data_inicio_contrato?.split(' ')[0] || '?'} a ${s.data_termino_contrato?.split(' ')[0] || '?'}</div></div></div>
                    <div class="col-md-4"><div class="info-card"><div class="info-label">Situação</div><div class="info-value"><span class="badge-situacao ${situacao==='Em andamento'?'badge-andamento':'badge-encerrado'}">${situacao}</span></div></div></div>
                </div>
                <h6 class="mt-4 fw-bold">Histórico de Pagamentos</h6>
                <div style="max-height:250px; overflow-y:auto;">
                    <table class="table table-sm"><thead class="bg-light"><tr><th>Mês/Ano</th><th>Órgão</th><th>Cargo</th><th class="text-right">Valor</th></tr></thead><tbody>
                        ${historico.map(i=>`<tr><td>${formatarMesAno(i.ano_mes)}</td><td>${i.orgao_sigla}</td><td>${i.cargo_descricao||'-'}</td><td class="text-right">${formatarMoeda(i.valor)}</td></tr>`).join('')}
                    </tbody><tfoot><tr><td colspan="3" class="fw-bold">Total</td><td class="text-right fw-bold">${formatarMoeda(totalPago)}</td></tr></tfoot></table>
                </div>
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        };

        // EXPORTAÇÕES

        window.exportarTabelaVisaoGeralCSV = function() {
            const dados = agruparPorOrgao(dadosFiltrados);
            const linhas = dados.map(i => [i.orgao, i.sigla, i.servidores, i.total]).map(l => l.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';'));
            const csv = ['Órgão;Sigla;Servidores;Valor Total', ...linhas].join('\n');
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'visao_geral_orgaos.csv';
            link.click();
        };

        window.exportarTabelaVisaoGeralPDF = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            const dados = agruparPorOrgao(dadosFiltrados).map(i => [i.orgao, i.sigla, i.servidores.toLocaleString('pt-BR'), formatarMoeda(i.total)]);
            doc.autoTable({
                head: [['Órgão', 'Sigla', 'Servidores', 'Valor Total']],
                body: dados,
                foot: [['Total Geral', '', dados.reduce((a,i)=>a+parseInt(i[2].replace(/\./g,'')),0).toLocaleString('pt-BR'), formatarMoeda(dados.reduce((a,i)=>a+parseFloat(i[3].replace('R$','').replace(/\./g,'').replace(',','.')),0))]],
                didDrawPage: (data) => {
                    doc.setFontSize(10);
                    doc.text('Visão Geral - Órgãos', 14, 10);
                    doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')} - ${window.location.href}`, 14, doc.internal.pageSize.height - 5);
                }
            });
            doc.save('visao_geral_orgaos.pdf');
        };

        window.exportarTabelaConsultaCSV = function() {
            const linhas = servidoresFiltrados.map(s => [formatarMASP(s.masp), s.nome, s.orgao_sigla, s.cargo_descricao||'', formatarMesAno(s.ultimoAnoMes), determinarSituacao(s.data_termino_contrato), s.ultimoValor].map(c => `"${String(c).replace(/"/g,'""')}"`).join(';'));
            const csv = ['MASP;Nome;Órgão;Cargo;Mês/Ano;Situação;Último Valor', ...linhas].join('\n');
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'consulta_servidores.csv';
            link.click();
        };

        window.exportarTabelaConsultaPDF = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            const dados = servidoresFiltrados.map(s => [formatarMASP(s.masp), s.nome, s.orgao_sigla, s.cargo_descricao||'', formatarMesAno(s.ultimoAnoMes), determinarSituacao(s.data_termino_contrato), formatarMoeda(s.ultimoValor)]);
            doc.autoTable({
                head: [['MASP', 'Nome', 'Órgão', 'Cargo', 'Mês/Ano', 'Situação', 'Último Valor']],
                body: dados,
                didDrawPage: (data) => {
                    doc.setFontSize(10);
                    doc.text('Consulta de Servidores', 14, 10);
                    doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')} - ${window.location.href}`, 14, doc.internal.pageSize.height - 5);
                }
            });
            doc.save('consulta_servidores.pdf');
        };

                                <p class="text-muted text-justify" style="font-size: 13px; text-align: justify;">

        window.baixarCSV = function() {
            if (!dadosCompletos.length) return;
            const cabecalhos = ['ano_mes','masp','orgao_sigla','orgao','nome','valor','cargo_sigla','cargo_descricao','data_inicio_contrato','data_termino_contrato'];
            const linhas = dadosCompletos.map(item => cabecalhos.map(cab => `"${(item[cab]||'').toString().replace(/"/g,'""')}"`).join(';'));
            const csv = [cabecalhos.join(';'), ...linhas].join('\n');
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'despesa_pessoal_brumadinho_completo.csv';
            link.click();
        };
